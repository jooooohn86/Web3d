<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; font-family: 'Georgia', serif; }
    #canvas { width: 100vw; height: 100vh; display: block; cursor: grab; }
    #canvas:active { cursor: grabbing; }

    #navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      background: rgba(10,10,10,0.55); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    #logo { font-size: 15px; font-weight: 700; letter-spacing: 0.18em; color: #fff; text-transform: uppercase; }
    #logo span { color: rgba(255,255,255,0.45); font-weight: 400; }
    #nav-center {
      display: flex; gap: 36px;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    #nav-center a {
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s; cursor: pointer;
    }
    #nav-center a:hover { color: #fff; }
    #nav-right { display: flex; align-items: center; gap: 16px; }
    #qr-btn {
      background: none; border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 3px;
      cursor: pointer; transition: all 0.2s;
    }
    #qr-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    #qr-panel {
      position: fixed; top: 68px; right: 32px;
      background: rgba(15,15,15,0.92); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      padding: 20px; display: none; flex-direction: column;
      align-items: center; gap: 10px; z-index: 200;
    }
    #qr-panel.show { display: flex; }
    #qr-panel p { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; }

    .arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 44px; height: 80px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; z-index: 100;
      color: rgba(255,255,255,0.35); transition: color 0.2s, opacity 0.3s;
      user-select: none;
    }
    .arrow:hover { color: rgba(255,255,255,0.9); }
    .arrow.disabled { opacity: 0.15; pointer-events: none; }
    #arrow-left  { left: 16px; }
    #arrow-right { right: 16px; }
    .arrow-icon  { font-size: 26px; line-height: 1; }
    .arrow-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

    #model-title {
      position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
      text-align: center; z-index: 100; pointer-events: none;
    }
    #model-title h2 {
      font-size: 18px; font-weight: 400; color: rgba(255,255,255,0.85);
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: opacity 0.3s;
    }
    #model-title p  { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-top: 4px; transition: opacity 0.3s; }

    #indicator {
      position: fixed; bottom: 112px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 100;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2); transition: background 0.3s; cursor: pointer;
    }
    .dot.active { background: rgba(255,255,255,0.85); }

    #footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      background: rgba(10,10,10,0.55); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    #footer-left   { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; }
    #footer-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.06em;
    }
    #footer-right  { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; }

    #loading {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 14px;
      gap: 16px; transition: opacity 0.5s; z-index: 999;
    }
    #progress-bar { width: 160px; height: 2px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
    #progress-fill { height: 100%; background: rgba(255,255,255,0.5); width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<nav id="navbar">
  <div id="logo">3D <span>STUDIO</span></div>
  <div id="nav-center">
    <a>Gallery</a><a>Models</a><a>About</a><a>Contact</a>
  </div>
  <div id="nav-right">
    <button id="qr-btn">QR 공유</button>
  </div>
</nav>

<div id="qr-panel">
  <div id="qr-canvas"></div>
  <p>스캔하여 접속</p>
</div>

<div class="arrow disabled" id="arrow-left">
  <span class="arrow-icon">‹</span>
  <span class="arrow-label">Prev</span>
</div>
<div class="arrow" id="arrow-right">
  <span class="arrow-icon">›</span>
  <span class="arrow-label">Next</span>
</div>

<div id="indicator"></div>

<div id="model-title">
  <h2 id="title-name"></h2>
  <p id="title-sub"></p>
</div>

<footer id="footer">
  <div id="footer-left">© 2026 3D Studio</div>
  <div id="footer-center">드래그: 회전 &nbsp;·&nbsp; 스크롤: 확대/축소</div>
  <div id="footer-right">Seoul, Korea</div>
</footer>

<div id="loading">
  <span id="loading-text">불러오는 중...</span>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ============================================================
//  ★ 모델 목록
// ============================================================
const MODELS = [
  { file: 'model_01.glb', title: 'Model 01', sub: 'Interactive 3D Viewer' },
  { file: 'model_02.glb', title: 'Model 02', sub: 'Interactive 3D Viewer' },
  // { file: 'model_03.glb', title: 'Model 03', sub: '...' },
];
const BASE_URL  = 'https://raw.githubusercontent.com/jooooohn86/Web3d/main/';
const SLIDE_GAP = 30; // 모델 간 X축 간격

// ── QR
const qrPanel = document.getElementById('qr-panel');
const qrBtn   = document.getElementById('qr-btn');
new QRCode(document.getElementById('qr-canvas'), {
  text: window.location.href, width: 160, height: 160,
  colorDark: '#ffffff', colorLight: '#111111', correctLevel: QRCode.CorrectLevel.M
});
qrBtn.addEventListener('click', () => {
  qrPanel.classList.toggle('show');
  qrBtn.textContent = qrPanel.classList.contains('show') ? 'QR 닫기' : 'QR 공유';
});
document.addEventListener('click', (e) => {
  if (!qrPanel.contains(e.target) && e.target !== qrBtn) {
    qrPanel.classList.remove('show');
    qrBtn.textContent = 'QR 공유';
  }
});

// ── 렌더러
const canvas       = document.getElementById('canvas');
const loadingEl    = document.getElementById('loading');
const loadingTxt   = document.getElementById('loading-text');
const progressFill = document.getElementById('progress-fill');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// ── 씬 / 카메라
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 2, 6);

// ── 스카이
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor: { value: new THREE.Color(0x1a1a3a) },
    midColor: { value: new THREE.Color(0xcc44aa) },
    botColor: { value: new THREE.Color(0x1a0a05) },
    horizon: { value: 0.0 }, spread: { value: 0.3 },
  },
  vertexShader: `varying vec3 vWorldPos;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vWorldPos=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
  fragmentShader: `uniform vec3 topColor,midColor,botColor;uniform float horizon,spread;varying vec3 vWorldPos;
    void main(){float h=normalize(vWorldPos).y;float t1=smoothstep(horizon,horizon+spread,h);float t2=smoothstep(horizon-spread,horizon,h);
    vec3 col=mix(botColor,midColor,t2);col=mix(col,topColor,t1);gl_FragColor=vec4(col,1.0);}`,
  side: THREE.BackSide, depthWrite: false,
});
const skyMesh = new THREE.Mesh(new THREE.SphereGeometry(200, 32, 32), skyMat);
scene.add(skyMesh);
scene.fog = new THREE.FogExp2(0x1a0d08, 0.008);

// ── OrbitControls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 1; controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI * 0.78;
controls.autoRotate = true; controls.autoRotateSpeed = 0.7;
controls.addEventListener('start', () => { controls.autoRotate = false; });

// ── 조명
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const keyLight = new THREE.PointLight(0xff5599, 3, 60);
keyLight.position.set(4, 5, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = keyLight.shadow.mapSize.height = 2048;
scene.add(keyLight);
const fillLight = new THREE.PointLight(0x3355aa, 1.5, 60);
fillLight.position.set(-5, 2, -3);
scene.add(fillLight);
const rimLight = new THREE.PointLight(0xff4400, 1.0, 40);
rimLight.position.set(0, -3, -6);
scene.add(rimLight);

// ── 바닥 (긴 띠 형태로 슬라이드 커버)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(SLIDE_GAP * MODELS.length + 20, 12),
  new THREE.MeshStandardMaterial({ color: 0x1a0d08, roughness: 1.0 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.6;
floor.receiveShadow = true;
scene.add(floor);

// ── 블룸
const BLOOM_LAYER = 1;
const bloomLayer  = new THREE.Layers();
bloomLayer.set(BLOOM_LAYER);
const renderPass    = new THREE.RenderPass(scene, camera);
const bloomPass     = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.1);
const bloomComposer = new THREE.EffectComposer(renderer);
bloomComposer.renderToScreen = false;
bloomComposer.addPass(renderPass);
bloomComposer.addPass(bloomPass);
const mixPass = new THREE.ShaderPass(new THREE.ShaderMaterial({
  uniforms: { baseTexture: { value: null }, bloomTexture: { value: bloomComposer.renderTarget2.texture } },
  vertexShader:   `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `uniform sampler2D baseTexture,bloomTexture;varying vec2 vUv;void main(){gl_FragColor=texture2D(baseTexture,vUv)+vec4(texture2D(bloomTexture,vUv).rgb,0.0);}`
}), 'baseTexture');
mixPass.needsSwap = true;
const finalComposer = new THREE.EffectComposer(renderer);
finalComposer.addPass(renderPass);
finalComposer.addPass(mixPass);

const darkMat  = new THREE.MeshBasicMaterial({ color: 0x000000 });
const matCache = {};
function darkenNonBloom(obj) {
  if (obj.isMesh && !bloomLayer.test(obj.layers)) { matCache[obj.uuid] = obj.material; obj.material = darkMat; }
}
function restoreMaterial(obj) {
  if (obj.isMesh && matCache[obj.uuid]) { obj.material = matCache[obj.uuid]; delete matCache[obj.uuid]; }
}

// ── 드라코
const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
const loader = new THREE.GLTFLoader();
loader.setDRACOLoader(dracoLoader);

// ── 슬라이드 상태
let currentIdx   = 0;
let isSliding    = false;
let mixers       = [];       // 각 모델별 mixer
let loadedModels = [];       // { model, mixer, idx }

// 카메라 슬라이드 목표 X
let camTargetX   = 0;
let camBaseZ     = 6;
let camBaseY     = 2;

// ── 인디케이터
const indicatorEl = document.getElementById('indicator');
MODELS.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => { if (!isSliding) slideTo(i); });
  indicatorEl.appendChild(dot);
});

function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}
function updateArrows(idx) {
  document.getElementById('arrow-left').classList.toggle('disabled', idx === 0);
  document.getElementById('arrow-right').classList.toggle('disabled', idx === MODELS.length - 1);
}

function setTitle(idx) {
  const el = document.getElementById('model-title');
  el.style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-name').textContent = MODELS[idx].title;
    document.getElementById('title-sub').textContent  = MODELS[idx].sub;
    el.style.opacity = '1';
  }, 300);
}

// ── 모델 배치 함수
function placeModel(gltf, idx) {
  const model = gltf.scene;
  const box    = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());

  model.position.sub(center);
  model.position.x += idx * SLIDE_GAP;   // X축으로 간격 배치
  model.position.y += size.y * 0.02;

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = child.receiveShadow = true;
      const mat = child.material;
      if (mat && mat.emissiveIntensity > 0 && mat.emissive &&
          (mat.emissive.r > 0 || mat.emissive.g > 0 || mat.emissive.b > 0)) {
        child.layers.enable(BLOOM_LAYER);
      }
    }
  });

  scene.add(model);

  let mx = null;
  if (gltf.animations && gltf.animations.length > 0) {
    mx = new THREE.AnimationMixer(model);
    gltf.animations.forEach(clip => mx.clipAction(clip).play());
  }

  // 첫 모델 기준 카메라 거리 설정
  if (idx === 0) {
    const maxDim = Math.max(size.x, size.y, size.z);
    camBaseZ = maxDim * 1.8;
    camBaseY = maxDim * 0.4;
    camTargetX = 0;
    camera.position.set(0, camBaseY, camBaseZ);
    controls.minDistance = maxDim * 0.3;
    controls.maxDistance = maxDim * 6;
    controls.target.set(0, 0, 0);
  }

  loadedModels[idx] = { model, mixer: mx };
}

// ── 슬라이드 전환
function slideTo(idx) {
  if (idx === currentIdx || isSliding) return;
  isSliding = true;
  controls.enabled    = false;  // 슬라이드 중 OrbitControls 완전 비활성화
  controls.autoRotate = false;

  const targetX = idx * SLIDE_GAP;
  const startX  = camTargetX;
  const startCamX = camera.position.x;
  const duration  = 900;
  const start     = performance.now();

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const e = easeInOut(t);
    camTargetX = startX + (targetX - startX) * e;
    camera.position.x = startCamX + (targetX - startCamX) * e;

    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      camTargetX        = targetX;
      camera.position.x = targetX;
      camera.position.y = camBaseY;
      camera.position.z = camBaseZ;

      // OrbitControls 상태를 새 위치에 맞게 완전 초기화
      controls.target.set(targetX, 0, 0);
      controls.update();
      controls.enabled    = true;
      controls.autoRotate = true;

      currentIdx = idx;
      isSliding  = false;
      setTitle(idx);
      updateDots(idx);
      updateArrows(idx);
    }
  }
  requestAnimationFrame(step);
}

// ── 화살표 / 키보드
document.getElementById('arrow-left').addEventListener('click',  () => { if (!isSliding) slideTo(currentIdx - 1); });
document.getElementById('arrow-right').addEventListener('click', () => { if (!isSliding) slideTo(currentIdx + 1); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  slideTo(currentIdx - 1);
  if (e.key === 'ArrowRight') slideTo(currentIdx + 1);
});

// ── 전체 모델 미리 로드
let loadedCount = 0;
MODELS.forEach((data, idx) => {
  loader.load(
    BASE_URL + data.file,
    (gltf) => {
      placeModel(gltf, idx);
      loadedCount++;
      if (loadedCount === MODELS.length) {
        // 전체 로드 완료
        setTitle(0);
        updateDots(0);
        updateArrows(0);
        loadingEl.style.opacity = '0';
        setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
      }
    },
    (progress) => {
      if (idx === 0 && progress.total > 0) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        progressFill.style.width = pct + '%';
        loadingTxt.textContent = `로딩 중... ${pct}%`;
      }
    },
    (error) => {
      console.error('로드 실패:', data.file, error);
      loadedCount++;
      if (loadedCount === MODELS.length) {
        setTitle(0); updateDots(0); updateArrows(0);
        loadingEl.style.opacity = '0';
        setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
      }
    }
  );
});

// ── 리사이즈
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  bloomComposer.setSize(window.innerWidth, window.innerHeight);
  finalComposer.setSize(window.innerWidth, window.innerHeight);
});

// ── 루프
let t = 0, prevTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now   = performance.now();
  const delta = (now - prevTime) / 1000;
  prevTime = now;

  t += 0.008;
  // 조명도 카메라 중심 기준으로 이동
  keyLight.position.x  = camTargetX + Math.sin(t * 0.35) * 6;
  keyLight.position.z  = Math.cos(t * 0.35) * 6;
  fillLight.position.x = camTargetX - 5;
  rimLight.position.x  = camTargetX;

  // 슬라이드 중에만 카메라 직접 제어 (OrbitControls는 비활성 상태)
  if (isSliding) {
    skyMesh.position.x = camera.position.x;
  } else {
    skyMesh.position.x = camera.position.x;
  }

  // 스카이도 카메라 따라 이동
  skyMesh.position.x = camera.position.x;

  loadedModels.forEach(m => { if (m && m.mixer) m.mixer.update(delta); });
  controls.update();

  scene.traverse(darkenNonBloom);
  bloomComposer.render();
  scene.traverse(restoreMaterial);
  finalComposer.render();
}
animate();
</script>
</body>
</html>
