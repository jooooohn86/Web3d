<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; }
    #canvas { width: 100vw; height: 100vh; display: block; cursor: grab; }
    #canvas:active { cursor: grabbing; }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.28);
      font-family: sans-serif;
      font-size: 12px;
      letter-spacing: 0.04em;
      pointer-events: none;
      white-space: nowrap;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 14px;
      gap: 16px;
      transition: opacity 0.5s;
    }
    #progress-bar {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.5);
      width: 0%;
      transition: width 0.2s;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="hint">드래그: 회전 &nbsp;·&nbsp; 스크롤: 확대/축소 &nbsp;·&nbsp; 두 손가락: 핀치 줌</div>
<div id="loading">
  <span id="loading-text">불러오는 중...</span>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

<script>
const canvas       = document.getElementById('canvas');
const loadingEl    = document.getElementById('loading');
const loadingTxt   = document.getElementById('loading-text');
const progressFill = document.getElementById('progress-fill');

// ── 렌더러
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// ── 씬 / 카메라
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);

// ── 초저녁 하늘 그라데이션 배경 (스카이박스 셰이더)
const skyGeo = new THREE.SphereGeometry(50, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor:    { value: new THREE.Color(0x1a1a3a) },  // 짙은 남색 (하늘 위)
    midColor:    { value: new THREE.Color(0xff6633) },  // 주황-붉은 (수평선)
    botColor:    { value: new THREE.Color(0x1a0a05) },  // 어두운 적갈색 (땅)
    horizon:     { value: 0.0 },                         // 수평선 높이
    spread:      { value: 0.3 },                         // 그라데이션 폭
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 topColor;
    uniform vec3 midColor;
    uniform vec3 botColor;
    uniform float horizon;
    uniform float spread;
    varying vec3 vWorldPos;
    void main() {
      float h = normalize(vWorldPos).y;
      // 수평선 위: mid → top
      float t1 = smoothstep(horizon, horizon + spread, h);
      // 수평선 아래: bot → mid
      float t2 = smoothstep(horizon - spread, horizon, h);
      vec3 col = mix(botColor, midColor, t2);
      col = mix(col, topColor, t1);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ── 환경광 색상도 초저녁 분위기로
scene.add(new THREE.AmbientLight(0xff8855, 0.4));

// ── 수평선 안개 (초저녁 붉은빛)
scene.fog = new THREE.FogExp2(0x1a0d08, 0.025);

// ── OrbitControls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.minDistance     = 1;
controls.maxDistance     = 18;
controls.maxPolarAngle   = Math.PI * 0.78;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.7;
controls.target.set(0, 0, 0);
controls.addEventListener('start', () => { controls.autoRotate = false; });

// ── 조명 (초저녁 분위기)
const keyLight = new THREE.PointLight(0xff7733, 3, 22);
keyLight.position.set(4, 5, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = keyLight.shadow.mapSize.height = 2048;
scene.add(keyLight);

const fillLight = new THREE.PointLight(0x3355aa, 1.5, 20);
fillLight.position.set(-5, 2, -3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xff4400, 1.0, 14);
rimLight.position.set(0, -3, -6);
scene.add(rimLight);

// ── 바닥
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(6, 48),
  new THREE.MeshStandardMaterial({ color: 0x1a0d08, roughness: 1.0 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.6;
floor.receiveShadow = true;
scene.add(floor);

// ── 블룸 포스트프로세싱
const BLOOM_LAYER = 1;
const bloomLayer  = new THREE.Layers();
bloomLayer.set(BLOOM_LAYER);

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.2, 0.4, 0.1
);

const renderPass = new THREE.RenderPass(scene, camera);
const bloomComposer = new THREE.EffectComposer(renderer);
bloomComposer.renderToScreen = false;
bloomComposer.addPass(renderPass);
bloomComposer.addPass(bloomPass);

const mixShader = {
  uniforms: {
    baseTexture:  { value: null },
    bloomTexture: { value: bloomComposer.renderTarget2.texture }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform sampler2D baseTexture;
    uniform sampler2D bloomTexture;
    varying vec2 vUv;
    void main() {
      gl_FragColor = texture2D(baseTexture, vUv) + vec4(texture2D(bloomTexture, vUv).rgb, 0.0);
    }
  `
};
const mixPass = new THREE.ShaderPass(new THREE.ShaderMaterial(mixShader), 'baseTexture');
mixPass.needsSwap = true;

const finalComposer = new THREE.EffectComposer(renderer);
finalComposer.addPass(renderPass);
finalComposer.addPass(mixPass);

// ── GLB 로드
let mixer = null;
const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
const loader = new THREE.GLTFLoader();
loader.setDRACOLoader(dracoLoader);

loader.load(
  'https://raw.githubusercontent.com/jooooohn86/Web3d/main/model.glb',

  (gltf) => {
    const model = gltf.scene;
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += size.y * 0.02;

    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, maxDim * 0.4, maxDim * 1.8);
    controls.minDistance = maxDim * 0.3;
    controls.maxDistance = maxDim * 6;

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow    = true;
        child.receiveShadow = true;
        const mat = child.material;
        if (mat && mat.emissiveIntensity > 0 &&
            mat.emissive &&
            (mat.emissive.r > 0 || mat.emissive.g > 0 || mat.emissive.b > 0)) {
          child.layers.enable(BLOOM_LAYER);
        }
      }
    });

    scene.add(model);

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(gltf.scene);
      gltf.animations.forEach((clip) => {
        mixer.clipAction(clip).play();
      });
    }

    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
  },

  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      progressFill.style.width = pct + '%';
      loadingTxt.textContent   = `로딩 중... ${pct}%`;
    }
  },

  (error) => {
    console.error('모델 로드 실패:', error);
    loadingTxt.textContent = '⚠ 모델 로드에 실패했습니다.';
    progressFill.style.background = 'rgba(255,80,80,0.6)';
    progressFill.style.width = '100%';
  }
);

// ── 리사이즈
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  bloomComposer.setSize(window.innerWidth, window.innerHeight);
  finalComposer.setSize(window.innerWidth, window.innerHeight);
});

// ── bloom 렌더링용 유틸
const darkMat  = new THREE.MeshBasicMaterial({ color: 0x000000 });
const matCache = {};
function darkenNonBloom(obj) {
  if (obj.isMesh && !bloomLayer.test(obj.layers)) {
    matCache[obj.uuid] = obj.material;
    obj.material = darkMat;
  }
}
function restoreMaterial(obj) {
  if (obj.isMesh && matCache[obj.uuid]) {
    obj.material = matCache[obj.uuid];
    delete matCache[obj.uuid];
  }
}

// ── 애니메이션 루프
let t = 0;
let prevTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now   = performance.now();
  const delta = (now - prevTime) / 1000;
  prevTime    = now;

  t += 0.008;
  keyLight.position.x = Math.sin(t * 0.35) * 6;
  keyLight.position.z = Math.cos(t * 0.35) * 6;

  if (mixer) mixer.update(delta);
  controls.update();

  scene.traverse(darkenNonBloom);
  bloomComposer.render();
  scene.traverse(restoreMaterial);
  finalComposer.render();
}
animate();
</script>

</body>
</html>
