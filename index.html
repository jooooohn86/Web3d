<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; }
    #canvas { width: 100vw; height: 100vh; display: block; cursor: grab; }
    #canvas:active { cursor: grabbing; }
    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.28); font-family: sans-serif; font-size: 12px;
      letter-spacing: 0.04em; pointer-events: none; white-space: nowrap;
    }
    #loading {
      position: fixed; inset: 0; background: #0d0d0d; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 14px;
      gap: 16px; transition: opacity 0.5s;
    }
    #progress-bar { width: 160px; height: 2px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
    #progress-fill { height: 100%; background: rgba(255,255,255,0.5); width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">드래그: 회전 &nbsp;·&nbsp; 스크롤: 확대/축소</div>
<div id="loading">
  <span id="loading-text">불러오는 중...</span>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

<script>
const canvas = document.getElementById('canvas');
const loadingEl = document.getElementById('loading');
const loadingTxt = document.getElementById('loading-text');
const progressFill = document.getElementById('progress-fill');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI * 0.78;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.7;
controls.target.set(0, 0, 0);
controls.addEventListener('start', () => { controls.autoRotate = false; });

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xaabbff, 0.6);
fillLight.position.set(-5, 2, -3);
scene.add(fillLight);

// 바닥
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 1.0 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.2;
floor.receiveShadow = true;
scene.add(floor);

// ── 블룸 포스트프로세싱 ──
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8,   // strength
  0.4,   // radius
  0.2    // threshold (낮을수록 더 많이 빛남)
);
composer.addPass(bloomPass);

// 모델 로드

  (gltf) => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += size.y * 0.02;
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, maxDim * 0.4, maxDim * 1.8);
    controls.minDistance = maxDim * 0.3;
    controls.maxDistance = maxDim * 6;

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;

        const matName = (child.material && child.material.name) ? child.material.name.toLowerCase() : '';

        // LED / emissive 재질 강화
        if (matName.includes('led') || matName.includes('emit') || matName.includes('glow')) {
          child.material = child.material.clone();
          // emissive 강도를 높여 블룸이 잘 걸리게
          child.material.emissiveIntensity = 3.0;
          if (child.material.emissive.r === 0 && child.material.emissive.g === 0 && child.material.emissive.b === 0) {
            child.material.emissive.set(0xffffff);
          }
        } else {
          // 일반 재질 노말맵 스케일 조정
          if (child.material && child.material.normalScale) {
            child.material.normalScale.set(0.3, 0.3);
          }
        }
      }
    });

    scene.add(model);
    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display = 'none'; }, 500);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      progressFill.style.width = pct + '%';
      loadingTxt.textContent = '로딩 중... ' + pct + '%';
    }
  },
  (error) => {
    console.error('로드 실패:', error);
    loadingTxt.textContent = '로드 실패: ' + error.message;
    progressFill.style.background = 'rgba(255,80,80,0.6)';
    progressFill.style.width = '100%';
  }
);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;
  dirLight.position.x = Math.sin(t * 0.35) * 8;
  dirLight.position.z = Math.cos(t * 0.35) * 8;
  controls.update();
  composer.render();  // renderer.render 대신 composer.render 사용
}
animate();
</script>
